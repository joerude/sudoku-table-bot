services:
  bot:
    build: .
    container_name: sudoku-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/sudoku.db
      TZ: Asia/Bishkek
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
